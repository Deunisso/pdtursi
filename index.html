<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Leitor HU Industrial</title>
  
  <!-- Configurações PWA (Tela Cheia Nativa) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121212">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .camera-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* O Vídeo e o Canvas de Desenho ficam sobrepostos */
    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Card de Leitura Fluido */
    .status-card {
      position: absolute;
      bottom: 30px;
      left: 5%;
      width: 90%;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(12px);
      padding: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      text-align: center;
      z-index: 10;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .label { font-size: 0.75rem; color: #8e8e93; text-transform: uppercase; letter-spacing: 1px; }
    .value { font-size: 1.4rem; font-weight: 700; color: #30d158; margin: 6px 0 12px 0; word-break: break-all; }
    
    button {
      width: 100%;
      padding: 12px;
      background: #0a84ff;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <!-- Canvas onde desenhamos a caixa verde sobre o código -->
    <canvas id="overlay"></canvas>
    
    <div class="status-card">
      <div class="label" id="statusLabel">Aguardando Etiqueta</div>
      <div class="value" id="huResult">Aponte a câmera...</div>
      <button onclick="reiniciar()">Nova Leitura</button>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const resultElement = document.getElementById('huResult');
    const statusLabel = document.getElementById('statusLabel');

    let escaneando = true;
    let detector = null;

    function playBeep() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = 1900;
        gain.gain.value = 0.1;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
      } catch (e) {}
    }

    async function iniciarCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'environment',
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }
        });
        
        video.srcObject = stream;

        // Ativar Zoom Leve (1.5x) para ajudar no foco sem colar a câmera no papel
        const track = stream.getVideoTracks()[0];
        const capabilities = track.getCapabilities();
        if (capabilities.zoom) {
          track.applyConstraints({
            advanced: [{ zoom: Math.min(1.5, capabilities.zoom.max) }]
          });
        }

        if ('BarcodeDetector' in window) {
          detector = new BarcodeDetector({ formats: ['code_128'] });
          requestAnimationFrame(loopDeLeitura);
        } else {
          statusLabel.innerText = "Navegador incompatível";
          resultElement.innerText = "Use o Chrome no Android ou Safari atualizado no iOS.";
        }
      } catch (err) {
        resultElement.innerText = "Erro ao acessar a câmera.";
        console.error(err);
      }
    }

    async function loopDeLeitura() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        // Redimensiona o canvas para bater com a tela
        canvas.width = video.clientWidth;
        canvas.height = video.clientHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (escaneando && detector) {
          try {
            const barcodes = await detector.detect(video);

            for (const barcode of barcodes) {
              // 1. Desenha o contorno dinâmico sobre o código
              desenharQuadrilatero(barcode.cornerPoints);

              // 2. Tenta extrair a HU (00)
              const limpo = barcode.rawValue.replace(/\D/g, '');
              const match = limpo.match(/(?:00)?(\d{18})/);

              if (match) {
                escaneando = false;
                playBeep();
                if (navigator.vibrate) navigator.vibrate(120);

                resultElement.innerText = "(00) " + match[1];
                statusLabel.innerText = "HU Capturada!";
                
                // Exemplo: Aqui você pode chamar sua API para enviar a HU lida:
                // enviarParaBackend(match[1]);
                return;
              }
            }
          } catch (e) {
            console.error(e);
          }
        }
      }
      requestAnimationFrame(loopDeLeitura);
    }

    // Desenha o contorno verde em volta do código detectado na tela
    function desenharQuadrilatero(points) {
      if (!points || points.length === 0) return;

      const scaleX = canvas.width / video.videoWidth;
      const scaleY = canvas.height / video.videoHeight;

      ctx.beginPath();
      ctx.moveTo(points[0].x * scaleX, points[0].y * scaleY);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x * scaleX, points[i].y * scaleY);
      }
      ctx.closePath();
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#30d158'; // Verde Neon
      ctx.fillStyle = 'rgba(48, 209, 88, 0.2)';
      ctx.fill();
      ctx.stroke();
    }

    function reiniciar() {
      escaneando = true;
      statusLabel.innerText = "Aguardando Etiqueta";
      resultElement.innerText = "Aponte a câmera...";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    window.addEventListener('load', iniciarCamera);
  </script>
</body>
</html>
