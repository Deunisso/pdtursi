<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor de HU / SSCC</title>
  <!-- Biblioteca para leitura via câmera -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 20px auto;
      padding: 0 15px;
    }
    .box {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      margin-top: 8px;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    #reader {
      width: 100%;
      margin-top: 10px;
    }
    .resultado {
      font-weight: bold;
      color: green;
      font-size: 1.1em;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h2>Leitura de HU (SSCC)</h2>

  <!-- MÉTODOS DE LEITURA -->
  <div class="box">
    <label for="inputBipador"><strong>Leitura por Pistola/Coletor (USB/Bluetooth):</strong></label>
    <input type="text" id="inputBipador" placeholder="Clique aqui e bipe o código..." autofocus>
  </div>

  <div class="box">
    <strong>Leitura por Câmera:</strong>
    <button id="btnCamera" onclick="iniciarCamera()">Abrir Câmera</button>
    <div id="reader"></div>
  </div>

  <!-- EXIBIÇÃO DO RESULTADO -->
  <div class="box">
    <h3>Dados Extraídos:</h3>
    <p>Código Bruto: <span id="rawText">-</span></p>
    <p>Código HU (SSCC): <span id="huCode" class="resultado">-</span></p>
  </div>

  <script>
    // Função para extrair apenas o número do HU (18 dígitos do AI 00)
    function processarCodigo(textoLido) {
      document.getElementById('rawText').innerText = textoLido;

      // Limpa caracteres especiais mantendo apenas números
      const apenasNumeros = textoLido.replace(/\D/g, '');

      // Regex para capturar os 18 dígitos do SSCC
      // Procura por 18 dígitos sequenciais iniciados ou não pelo prefixo '00'
      const match = apenasNumeros.match(/(?:00)?(\d{18})/);

      if (match) {
        const huCalculado = match[1];
        document.getElementById('huCode').innerText = "(00) " + huCalculado;
      } else {
        document.getElementById('huCode').innerText = "HU inválida ou formato não reconhecido.";
      }
    }

    // 1. Lógica do Bipador Físico
    const input = document.getElementById('inputBipador');
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        processarCodigo(this.value);
        this.value = ''; // Limpa para a próxima leitura
      }
    });

    // 2. Lógica da Câmera (HTML5 QRCode)
    let html5QrcodeScanner = null;

    function iniciarCamera() {
      if (html5QrcodeScanner) return;

      html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", 
        { fps: 10, qrbox: { width: 250, height: 150 } },
        /* verbose= */ false
      );

      html5QrcodeScanner.render((decodedText) => {
        processarCodigo(decodedText);
        html5QrcodeScanner.clear(); // Para a câmera após a leitura com sucesso
        html5QrcodeScanner = null;
      }, (error) => {
        // Erros contínuos de scan são ignorados
      });
    }
  </script>
</body>
</html>
