<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Leitor HU - Full Screen AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* O vídeo ocupa a tela inteira sem restrição */
    .camera-container {
      position: relative;
      flex: 1;
      width: 100%;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Painel Flutuante do Resultado */
    .status-card {
      position: absolute;
      bottom: 20px;
      left: 5%;
      width: 90%;
      background: rgba(30, 30, 30, 0.9);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      z-index: 10;
    }

    .label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
    .value { font-size: 1.4rem; font-weight: bold; color: #00ff66; margin: 8px 0; }
    
    button {
      width: 100%;
      padding: 12px;
      background: #007aff;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    
    <div class="status-card">
      <div class="label">HU Detectada (00)</div>
      <div class="value" id="huResult">Aponte para a etiqueta...</div>
      <button onclick="reiniciar()">Próxima Leitura</button>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const resultElement = document.getElementById('huResult');
    let escaneando = true;
    let detector = null;

    // 1. Som de confirmação instantâneo
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = 1900;
        gain.gain.value = 0.1;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.08);
      } catch (e) {}
    }

    // 2. Extrai os 18 dígitos do AI (00) de qualquer código lido na tela
    function processarCodigos(barcodes) {
      if (!escaneando) return;

      for (const barcode of barcodes) {
        const limpo = barcode.rawValue.replace(/\D/g, '');
        
        // Busca padrão do SSCC (18 dígitos)
        const match = limpo.match(/(?:00)?(\d{18})/);
        if (match) {
          escaneando = false;
          playBeep();
          if (navigator.vibrate) navigator.vibrate(100);

          resultElement.innerText = "(00) " + match[1];
          return;
        }
      }
    }

    // 3. Inicializa Câmera em Alta Definição (Full Frame)
    async function iniciarCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'environment',
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }
        });
        video.srcObject = stream;

        // Verifica se o navegador suporta a API Nativa de Hardware (Android ML Kit / iOS Vision)
        if ('BarcodeDetector' in window) {
          detector = new BarcodeDetector({ formats: ['code_128'] });
          requestAnimationFrame(loopDeLeituraNativo);
        } else {
          resultElement.innerText = "Navegador antigo: use Chrome no Android ou Safari no iOS.";
        }
      } catch (err) {
        resultElement.innerText = "Erro ao acessar a câmera.";
        console.error(err);
      }
    }

    // 4. Loop de Leitura Ultra-Rápido (Varre a tela inteira a cada quadro do vídeo)
    async function loopDeLeituraNativo() {
      if (escaneando && detector && video.readyState === video.HAVE_ENOUGH_DATA) {
        try {
          const barcodes = await detector.detect(video);
          if (barcodes.length > 0) {
            processarCodigos(barcodes);
          }
        } catch (e) {
          console.error(e);
        }
      }
      requestAnimationFrame(loopDeLeituraNativo);
    }

    function reiniciar() {
      escaneando = true;
      resultElement.innerText = "Aponte para a etiqueta...";
    }

    window.addEventListener('load', iniciarCamera);
  </script>
</body>
</html>
