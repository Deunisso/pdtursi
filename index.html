<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor GS1-128 HU (SSCC-18)</title>
    <style>
        :root {
            --primary: #2563eb;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --success: #16a34a;
            --error: #dc2626;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 550px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            text-align: center;
            font-size: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .status {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }

        .status.success {
            display: block;
            background-color: #dcfce7;
            color: var(--success);
        }

        .status.error {
            display: block;
            background-color: #fee2e2;
            color: var(--error);
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            display: none;
        }

        .result-table th, .result-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .result-table th {
            background-color: #f1f5f9;
            font-weight: 600;
            width: 40%;
        }

        .badge {
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }

        .raw-code {
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 1px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Leitor GS1-128 / HU (SSCC-18)</h2>
    
    <div class="input-group">
        <label for="barcodeInput">Aguardando leitura do Scanner...</label>
        <input type="text" id="barcodeInput" autofocus placeholder="Bipe o código de barras aqui..." autocomplete="off">
    </div>

    <div id="statusMessage" class="status"></div>

    <table id="resultTable" class="result-table">
        <tbody>
            <tr>
                <th>Código Lido:</th>
                <td id="resRaw" class="raw-code"></td>
            </tr>
            <tr>
                <th>Identificador (AI):</th>
                <td><span class="badge">(00)</span> SSCC / Handling Unit</td>
            </tr>
            <tr>
                <th>Dígito de Extensão:</th>
                <td id="resExtension" style="font-family: monospace;"></td>
            </tr>
            <tr>
                <th>Prefixo Empresa / Sequencial:</th>
                <td id="resSerial" style="font-family: monospace;"></td>
            </tr>
            <tr>
                <th>Dígito Verificador:</th>
                <td id="resCheckDigit" style="font-family: monospace;"></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const barcodeInput = document.getElementById('barcodeInput');
    const statusMessage = document.getElementById('statusMessage');
    const resultTable = document.getElementById('resultTable');

    // Mantém o foco no input caso o usuário clique fora
    document.addEventListener('click', () => {
        barcodeInput.focus();
    });

    // Processa a entrada do leitor
    barcodeInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            processBarcode(this.value);
            this.value = ''; // Limpa para a próxima leitura
        }
    });

    function processBarcode(rawInput) {
        // Remove parênteses, espaços e letras (limpa a string deixando apenas números)
        let cleaned = rawInput.replace(/\D/g, '');

        // Se o código começar com o AI (00), removemos temporariamente para avaliar os 18 dígitos da HU
        let hasAI = false;
        if (cleaned.startsWith('00') && cleaned.length === 20) {
            cleaned = cleaned.substring(2);
            hasAI = true;
        }

        // Validação: A HU (SSCC-18) precisa ter exatamente 18 dígitos numéricos
        if (cleaned.length === 18) {
            showStatus('Leitura realizada com sucesso!', 'success');
            
            // Quebra dos componentes do GS1-128 (SSCC)
            const extensionDigit = cleaned.substring(0, 1);
            const serialContent = cleaned.substring(1, 17); // Prefixo CNPJ da empresa + sequencial interno
            const checkDigit = cleaned.substring(17, 18);

            // Exibe nos campos da tabela
            document.getElementById('resRaw').innerText = `(00) ${cleaned}`;
            document.getElementById('resExtension').innerText = extensionDigit;
            document.getElementById('resSerial').innerText = serialContent;
            document.getElementById('resCheckDigit').innerText = checkDigit;

            resultTable.style.display = 'table';
        } else {
            showStatus(`Código inválido. Esperado 18 dígitos da HU (Lido: ${cleaned.length} dígitos).`, 'error');
            resultTable.style.display = 'none';
        }
    }

    function showStatus(message, type) {
        statusMessage.innerText = message;
        statusMessage.className = `status ${type}`;
    }
</script>

</body>
</html>
