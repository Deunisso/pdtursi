<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDTursi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100%); }
      to { opacity: 1; transform: translateX(0); }
    }
    .toast-animate { animation: slideIn 0.3s ease-out forwards; }
    
    /* Força o elemento de vídeo gerado a cobrir toda a área do scanner */
    #reader video {
      object-fit: cover !important;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body class="bg-gray-900 text-white p-4 font-sans min-h-screen relative">

  <div id="containerToasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2 max-w-xs w-full pointer-events-none"></div>

  <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
    
    <div class="md:col-span-1 lg:col-span-1 space-y-4">
      <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-xl space-y-3">
        <div class="flex justify-between items-center">
          <h1 class="text-base font-bold text-blue-400 tracking-tight flex items-center gap-1.5">
            <span>📡 PDTursi</span>
          </h1>
          <span id="badgeModo" class="text-[9px] bg-emerald-950 text-emerald-300 border border-emerald-500/30 px-2 py-0.5 rounded font-mono font-bold animate-pulse">ZXING ACTIVE</span>
        </div>
        
        <div class="relative overflow-hidden rounded-lg border-2 border-gray-600 bg-black aspect-square w-full shadow-inner">
          
          <div id="reader" class="w-full h-full"></div>
          
          <div id="focusArea" class="absolute inset-x-4 top-[38%] bottom-[38%] border-2 border-dashed border-yellow-400/50 z-30 pointer-events-none rounded transition-all duration-100"></div>
          <div id="laserLine" class="absolute inset-x-0 top-1/2 h-[3px] bg-red-600 z-30 pointer-events-none shadow-[0_0_12px_rgba(220,38,38,1)] animate-pulse"></div>
          <div id="scanLockPulse" class="absolute inset-0 z-40 bg-green-500/0 pointer-events-none transition-all duration-150"></div>
          <div id="feedTextOverlay" class="absolute bottom-2 left-2 z-30 pointer-events-none"></div>
        </div>

        <div class="pt-2 border-t border-gray-700">
          <label class="text-[11px] font-semibold text-gray-300 block mb-1 flex justify-between">
            <span>⌨️ Digitação Crítica / Backup:</span>
            <span class="text-[10px] text-yellow-500 font-bold">(4 dígitos livres)</span>
          </label>
          <div class="flex gap-2">
            <input type="text" inputmode="numeric" id="inputManual" placeholder="Ex: 3610" 
              class="bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white w-full font-mono focus:outline-none focus:border-blue-400 shadow-inner">
            <button onclick="enviarManual()" class="bg-blue-600 hover:bg-blue-500 font-bold px-4 py-2 rounded-lg text-xs transition shadow active:scale-95">OK</button>
          </div>
        </div>

        <div id="statusPainel" class="p-2.5 bg-gray-900 rounded-lg text-center text-xs font-semibold text-gray-400">
          Calibrando foco automático...
        </div>
      </div>
    </div>

    <div class="md:col-span-1 lg:col-span-1 space-y-4">
      <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-xl flex flex-col h-[calc(100vh-2rem)] min-h-[500px]">
        <div class="border-b border-gray-700 pb-3 mb-3">
          <h2 class="text-base font-bold text-yellow-400 flex items-center gap-2">📍 Bins Recomendados</h2>
          <p class="text-xs text-gray-400">Posições pendentes no inventário</p>
        </div>
        <div id="listaBins" class="flex-1 overflow-y-auto space-y-2 pr-1 text-sm">
          <div class="text-center py-8 text-gray-600 text-xs">Aguardando banco de dados...</div>
        </div>
      </div>
    </div>

    <div class="md:col-span-1 lg:col-span-2 space-y-4">
      <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-xl flex flex-col h-[calc(100vh-2rem)] min-h-[500px]">
        <div class="flex justify-between items-center border-b border-gray-700 pb-3 mb-3">
          <div>
            <div class="flex items-center gap-2">
              <h2 class="text-xl font-bold">Progresso LX02</h2>
              <span id="badgeConexao" class="text-[10px] px-2 py-0.5 rounded-full font-bold bg-yellow-500/20 text-yellow-400 border border-yellow-500/30 animate-pulse">🔄 CONECTANDO...</span>
            </div>
            <p class="text-xs text-gray-400">Sincronizado em tempo real</p>
          </div>
          <span id="txtProgresso" class="text-sm font-mono bg-blue-900 text-blue-300 px-3 py-1 rounded-full font-bold">0/0 Itens</span>
        </div>
        <div id="listaDashboard" class="flex-1 overflow-y-auto space-y-2 pr-1 text-sm">
          <div class="text-center py-8 text-gray-500 flex flex-col items-center justify-center gap-2">
            <span class="animate-spin text-xl text-blue-400">⏳</span>Consultando banco de dados...
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Configurações Globais
    const URL_APPLICACAO = "https://script.google.com/macros/s/AKfycbybCcaDgjqzefPpUuo3cCP3PWnTQrknXt4DNtdKsZ5_dE6pFkLCTRlB3PWgGoQlfCZnKA/exec"; 

    const statusPainel = document.getElementById('statusPainel');
    const listaDashboard = document.getElementById('listaDashboard');
    const listaBins = document.getElementById('listaBins');
    const txtProgresso = document.getElementById('txtProgresso');
    const badgeConexao = document.getElementById('badgeConexao');
    const inputManual = document.getElementById('inputManual');
    const containerToasts = document.getElementById('containerToasts');
    const focusArea = document.getElementById('focusArea');
    const laserLine = document.getElementById('laserLine');
    const scanLockPulse = document.getElementById('scanLockPulse');
    const feedTextOverlay = document.getElementById('feedTextOverlay');
    
    let processandoBipe = false;
    let ultimaHULida = "";
    let tempoUltimoBipe = 0;
    let estaBuscando = false; 
    let primeiraCarga = true;
    
    let bancoDadosLocalHUs = []; 
    let memoriaStatusHUs = {}; 
    let cacheDadosAnteriores = ""; 

    function escaparHTML(string) {
      return String(string).replace(/[&<>"']/g, function(m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
      });
    }

    function mostrarToast(titulo, mensagem, tipo = 'sucesso') {
      const id = 'toast-' + Date.now();
      const corBorda = tipo === 'sucesso' ? 'border-emerald-500 bg-emerald-950/90 text-emerald-200' : 'border-blue-500 bg-blue-950/90 text-blue-200';
      const icone = tipo === 'sucesso' ? '🎉' : '🔔';

      const toastHTML = `
        <div id="${id}" class="pointer-events-auto p-3 rounded-lg border ${corBorda} shadow-2xl backdrop-blur-md flex items-start gap-3 toast-animate transition-all duration-300">
          <span class="text-lg">${icone}</span>
          <div class="flex-1 text-xs">
            <p class="font-bold text-white">${escaparHTML(titulo)}</p>
            <p class="text-[11px] opacity-90 font-mono mt-0.5">${escaparHTML(mensagem)}</p>
          </div>
        </div>
      `;
      containerToasts.insertAdjacentHTML('afterbegin', toastHTML);
      const el = document.getElementById(id);
      setTimeout(() => {
        if (el) {
          el.style.opacity = '0';
          el.style.transform = 'translateX(100%)';
          setTimeout(() => el.remove(), 300);
        }
      }, 4500);
    }

    function atualizarDashboard() {
      if (estaBuscando) return; 
      estaBuscando = true;

      fetch(URL_APPLICACAO)
        .then(res => {
          if (!res.ok) throw new Error("Erro de resposta do servidor");
          return res.json();
        })
        .then(itens => {
          estaBuscando = false;
          
          const stringDadosAtuais = JSON.stringify(itens);
          if (stringDadosAtuais === cacheDadosAnteriores) {
            return; 
          }
          cacheDadosAnteriores = stringDadosAtuais;

          badgeConexao.className = "text-[10px] px-2 py-0.5 rounded-full font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
          badgeConexao.textContent = "● ONLINE";

          bancoDadosLocalHUs = itens || [];

          let htmlHUs = "";
          let conferidos = 0;
          let statusDosBins = {};
          let novosItensConferidos = [];
          
          if(!itens || itens.length === 0) {
            listaDashboard.innerHTML = `<div class="text-center py-8 text-gray-500 text-xs">Nenhum item localizado no banco de dados.</div>`;
            return;
          }

          itens.forEach(item => {
            const eraConferidoAntes = memoriaStatusHUs[item.hu] || false;
            if (!eraConferidoAntes && item.conferido && !primeiraCarga) {
              novosItensConferidos.push(item);
            }
            memoriaStatusHUs[item.hu] = item.conferido;

            if (item.conferido) conferidos++;
            const nomeBin = item.bin ? String(item.bin).trim() : "N/A";
            if (!statusDosBins[nomeBin]) statusDosBins[nomeBin] = { total: 0, conferidos: 0 };
            statusDosBins[nomeBin].total++;
            if (item.conferido) statusDosBins[nomeBin].conferidos++;

            const cardCor = item.conferido ? "bg-emerald-950/70 border-emerald-500" : "bg-gray-900/50 border-gray-700";
            const badge = item.conferido ? "<span class='bg-emerald-500 text-black text-[10px] px-2 py-0.5 rounded font-bold'>✓ OK</span>" : "<span class='bg-amber-500/20 text-amber-400 text-[10px] px-2 py-0.5 rounded border border-amber-500/30'>PENDENTE</span>";

            htmlHUs += `
              <div class="p-3 rounded-lg border ${cardCor} flex justify-between items-center transition-all">
                <div>
                  <p class="text-xs font-mono font-bold text-gray-400">HU: ${escaparHTML(item.hu)}</p>
                  <p class="font-bold text-white text-xs">${escaparHTML(item.material)} - ${escaparHTML(item.descricao)}</p>
                  <p class="text-[11px] text-yellow-400">Bin: ${escaparHTML(item.bin)}</p>
                  <p class="text-[11px] text-cyan-400 font-medium">Qtd: ${escaparHTML(item.quantidade || '0')}</p>
                </div>
                <div>${badge}</div>
              </div>`;
          });
          
          listaDashboard.innerHTML = htmlHUs;
          txtProgresso.textContent = `${conferidos}/${itens.length} Itens`;

          if (novosItensConferidos.length > 0) {
            novosItensConferidos.forEach(novo => {
              mostrarToast("Item Conferido!", `HU final ...${String(novo.hu).slice(-4)} no Bin ${novo.bin}`, 'sucesso');
            });
          }

          primeiraCarga = false;

          let htmlBins = "";
          Object.keys(statusDosBins).sort().forEach(nomeBin => {
            const info = statusDosBins[nomeBin];
            if (info.conferidos === info.total) return;
            const indicador = `<span class='bg-amber-500/10 border border-amber-500/30 text-amber-400 text-[11px] px-2 py-0.5 rounded font-mono font-bold'>${info.total - info.conferidos} HU PEND</span>`;
            htmlBins += `
              <div class="p-3 rounded-lg border bg-gray-900/40 border-gray-700 flex justify-between items-center transition-all">
                <div class="font-mono">
                  <p class="text-sm tracking-wide text-amber-400 font-bold">${escaparHTML(nomeBin)}</p>
                  <p class="text-[10px] text-gray-500">Progresso: ${info.conferidos}/${info.total} HUs</p>
                </div>
                <div>${indicador}</div>
              </div>`;
          });
          
          if (htmlBins === "") htmlBins = `<div class="text-center py-8 text-emerald-400 font-semibold text-xs border border-dashed border-emerald-800 rounded-lg bg-emerald-950/20 px-2">🎉 Todos os Bins conferidos!</div>`;
          listaBins.innerHTML = htmlBins;
        })
        .catch((error) => { 
          estaBuscando = false; 
          badgeConexao.className = "text-[10px] px-2 py-0.5 rounded-full font-bold bg-red-500/20 text-red-400 border border-red-500/30";
          badgeConexao.textContent = "🔴 ERRO CONEXÃO";
          console.error("Erro na busca de rede:", error);
        });
    }

    function processarCaptura(textoCru, fonte = "CÂMERA") {
      const agora = Date.now();
      let codigoParaEnviar = String(textoCru).replace(/\D/g, "").trim();
      
      if (!codigoParaEnviar) return;

      if (fonte === "MANUAL") {
        if (codigoParaEnviar.length < 4) {
          statusPainel.innerHTML = `<span class='text-amber-400 font-bold'>⚠️ Digite no mínimo 4 números!</span>`;
          return;
        }

        const huCorrespondente = bancoDadosLocalHUs.find(item => {
          const huTexto = String(item.hu).trim();
          return huTexto.endsWith(codigoParaEnviar) || huTexto.includes(codigoParaEnviar);
        });

        if (huCorrespondente) {
          codigoParaEnviar = huCorrespondente.hu; 
        } else {
          statusPainel.innerHTML = `<span class='text-red-400 font-bold'>✗ Final ...${codigoParaEnviar} não encontrado na lista local.</span>`;
          if (navigator.vibrate) navigator.vibrate([300]);
          return;
        }
      } else {
        if (codigoParaEnviar.length < 8) return;
      }

      if (codigoParaEnviar === ultimaHULida && (agora - tempoUltimoBipe) < 2500 && fonte !== "MANUAL") return;
      if (processandoBipe) return;

      processandoBipe = true;
      ultimaHULida = codigoParaEnviar;
      tempoUltimoBipe = agora;

      // ====================================================
      // UX EM TEMPO REAL: DETECÇÃO INSTANTÂNEA E TRAVAMENTO DE MIRA
      // ====================================================
      if (fonte === "BARCODE") {
        focusArea.className = "absolute inset-x-4 top-[38%] bottom-[38%] border-4 border-green-400 z-30 pointer-events-none rounded scale-105 transition-all duration-75";
        laserLine.className = "absolute inset-x-0 top-1/2 h-[4px] bg-green-400 z-30 pointer-events-none shadow-[0_0_15px_rgba(74,222,128,1)]";
        scanLockPulse.className = "absolute inset-0 z-40 bg-green-500/20 pointer-events-none transition-all duration-75";
        
        feedTextOverlay.innerHTML = `
          <div class="text-white bg-black/80 px-2 py-1.5 rounded font-mono text-[9px] border border-green-500/30 space-y-0.5 shadow-lg">
            <p class="text-green-400 font-bold flex items-center gap-1">● AUTOFOCUS LOCKED (0.1s)</p>
            <p class="text-gray-300">DECODING: GS1-128 COMPLIANT</p>
            <p class="text-blue-400 font-semibold">HU: ...${codigoParaEnviar.slice(-4)}</p>
          </div>
        `;

        setTimeout(() => {
          focusArea.className = "absolute inset-x-4 top-[38%] bottom-[38%] border-2 border-dashed border-yellow-400/50 z-30 pointer-events-none rounded scale-100 transition-all duration-150";
          laserLine.className = "absolute inset-x-0 top-1/2 h-[3px] bg-red-600 z-30 pointer-events-none shadow-[0_0_12px_rgba(220,38,38,1)] animate-pulse";
          scanLockPulse.className = "absolute inset-0 z-40 bg-green-500/0 pointer-events-none transition-all duration-150";
          feedTextOverlay.innerHTML = "";
        }, 350);
      }

      statusPainel.innerHTML = `<span class='text-yellow-400 animate-pulse font-bold'>⚡ [${fonte}] Enviando: ${codigoParaEnviar}...</span>`;
      
      fetch(URL_APPLICACAO, {
        method: "POST",
        redirect: "follow",
        body: JSON.stringify({ hu: codigoParaEnviar })
      })
      .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
      })
      .then(res => {
        processandoBipe = false;
        if (res.encontrado) {
          inputManual.value = ""; 
          statusPainel.innerHTML = `<span class='text-emerald-400 font-bold'>✓ [${fonte}] OK: HU ${res.hu} (0.5s)</span>`;
          if (navigator.vibrate) navigator.vibrate([80, 40, 80]); 
          atualizarDashboard(); 
        } else {
          statusPainel.innerHTML = `<div class='text-red-400 text-xs font-bold'>✗ CONFLITO NA PLANILHA<br><span class='text-[10px] text-gray-400 font-mono'>HU: ${codigoParaEnviar}</span></div>`;
          if (navigator.vibrate) navigator.vibrate([400]); 
        }
      })
      .catch(() => { 
        processandoBipe = false; 
        statusPainel.innerHTML = `<span class='text-red-400 font-bold'>✗ ERRO DE TRANSMISSÃO DE DADOS</span>`;
      });
    }

    function enviarManual() {
      const val = inputManual.value.trim();
      processarCaptura(val, "MANUAL");
    }

    inputManual.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        enviarManual();
      }
    });

    // ====================================================
    // MOTOR DE CÂMERA ACELERADO (60 FPS & RESOLUÇÃO BALANCEADA)
    // ====================================================
    function iniciarBarcodeScanner() {
      const scannerBarcode = new Html5Qrcode("reader", { 
        formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128 ],
        verbose: false 
      });
      
      const config = { 
        fps: 60, 
        qrbox: (width, height) => { 
          // Otimização de Janela Estreita focado em GS1-128
          const larguraFixa = width * 0.92;
          const alturaFixa = height * 0.22;
          return { width: larguraFixa, height: alturaFixa } 
        },
        videoConstraints: { 
          facingMode: "environment", 
          focusMode: "continuous",
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 60 }
        }
      };

      scannerBarcode.start({ facingMode: "environment" }, config, (decodedText) => {
        processarCaptura(decodedText, "BARCODE");
      })
      .then(() => { 
        document.getElementById('badgeModo').className = "text-[9px] bg-green-950 text-green-300 border border-green-500/40 px-2 py-0.5 rounded font-mono font-bold";
        document.getElementById('badgeModo').textContent = "NEURAL-ENGINE: BOOST";
        statusPainel.innerHTML = "<span class='text-emerald-400 font-semibold'>📷 Scanner Otimizado Pro Pronto.</span>"; 
      })
      .catch(() => { 
        statusPainel.innerHTML = "<span class='text-amber-400 block font-bold text-xs'>Permita acesso à câmera e recarregue.</span>"; 
      });
    }

    window.addEventListener('load', () => {
      atualizarDashboard();
      iniciarBarcodeScanner();
      
      // Polling de 12 segundos para preservar a cota do Google Apps Script.
      setInterval(atualizarDashboard, 12000);
    });
  </script>
</body>
</html>
